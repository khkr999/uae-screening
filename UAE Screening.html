<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UAE Regulatory Screening</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
input, select, textarea, button { font-family: inherit; }

/* ── Dark theme (default) ───────────────────────────────────────────── */
:root, [data-theme="dark"] {
  --bg-deep:    #060818;
  --bg-base:    #090E1D;
  --bg-card:    #0D1326;
  --bg-raised:  #111A30;
  --bg-hover:   #162038;
  --text-primary:   #E2EAF8;
  --text-secondary: #8896B4;
  --text-tertiary:  #4E5E7A;
  --gold:        #C9A84C;
  --gold-dim:    rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.25);
  --border:      rgba(255,255,255,0.07);
  --border-mid:  rgba(255,255,255,0.04);
  --tag-bg:      rgba(255,255,255,0.05);
  --shadow:      0 2px 12px rgba(0,0,0,0.35);
  --shadow-raised: 0 6px 24px rgba(0,0,0,0.5);
  color: #E2EAF8;
  background: #060818;
}

/* ── Light theme ────────────────────────────────────────────────────── */
[data-theme="light"] {
  --bg-deep:    #EBF0FB;
  --bg-base:    #F3F6FF;
  --bg-card:    #FFFFFF;
  --bg-raised:  #F0F4FF;
  --bg-hover:   #E6EDFF;
  --text-primary:   #0F172A;
  --text-secondary: #475569;
  --text-tertiary:  #94A3B8;
  --gold:        #8A6012;
  --gold-dim:    rgba(138,96,18,0.1);
  --gold-border: rgba(138,96,18,0.3);
  --border:      rgba(0,0,0,0.09);
  --border-mid:  rgba(0,0,0,0.05);
  --tag-bg:      rgba(0,0,0,0.04);
  --shadow:      0 2px 8px rgba(0,0,0,0.07);
  --shadow-raised: 0 6px 20px rgba(0,0,0,0.12);
  color: #0F172A;
  background: #EBF0FB;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 99px; }

@keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
@keyframes fadeUp  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.tab-content { animation: fadeUp 0.18s ease; }

/* Tweaks panel */
#tweaks-panel {
  display:none; position:fixed; bottom:24px; right:24px; z-index:300;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:12px; padding:16px; width:240px;
  box-shadow:var(--shadow-raised);
}
#tweaks-panel.visible { display:block; }
.tweak-label { color:var(--text-tertiary); font-size:9px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; display:block; }
.tweak-row { margin-bottom:12px; }
.tweak-row select { width:100%; background:var(--bg-raised); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); font-size:11px; padding:5px 8px; cursor:pointer; }
</style>
</head>
<body style="background:var(--bg-deep); color:var(--text-primary); min-height:100vh;">
<div id="root"></div>

<div id="tweaks-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span style="color:var(--gold);font-size:11px;font-weight:800;">Tweaks</span>
    <button onclick="document.getElementById('tweaks-panel').classList.remove('visible')"
      style="background:none;border:none;color:var(--text-tertiary);font-size:14px;cursor:pointer;">✕</button>
  </div>
  <div class="tweak-row">
    <span class="tweak-label">Default Tab</span>
    <select id="tweak-tab" onchange="window.__setTab&&window.__setTab(this.value)">
      <option value="overview">Overview</option>
      <option value="search">Search & Filter</option>
      <option value="insights">Insights</option>
    </select>
  </div>
  <div class="tweak-row">
    <span class="tweak-label">Color Theme</span>
    <select id="tweak-theme" onchange="window.__setDark(this.value==='dark')">
      <option value="dark">Dark (default)</option>
      <option value="light">Light</option>
    </select>
  </div>
  <div class="tweak-row">
    <span class="tweak-label">Entities Per Page</span>
    <select id="tweak-perpage" onchange="window.__setPerPage&&window.__setPerPage(parseInt(this.value))">
      <option value="12">12 (default)</option>
      <option value="25">25</option>
      <option value="50">50</option>
    </select>
  </div>
  <div class="tweak-row">
    <span class="tweak-label">KPI Highlight Color</span>
    <select id="tweak-kpi" onchange="window.__setKpiColor&&window.__setKpiColor(this.value)">
      <option value="warn">Warn on Critical (default)</option>
      <option value="neutral">Always neutral</option>
    </select>
  </div>
</div>

<script src="mock-data.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="overview-tab.jsx"></script>
<script type="text/babel" src="search-tab.jsx"></script>
<script type="text/babel" src="insights-tab.jsx"></script>

<script type="text/babel">
const { entities, runName, runDate, dataSource, trends } = window.SCREENING;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "defaultTab": "overview",
  "theme": "dark"
}/*EDITMODE-END*/;

const App = () => {
  const savedTab   = localStorage.getItem("uae_tab")   || TWEAK_DEFAULTS.defaultTab;
  const savedTheme = localStorage.getItem("uae_theme") || TWEAK_DEFAULTS.theme;

  const [activeTab, setActiveTabRaw] = React.useState(savedTab);
  const [dark, setDarkRaw]           = React.useState(savedTheme !== "light");
  const [selectedEntity, setSelected] = React.useState(null);
  const [workflowLog, setWorkflow]    = React.useState({});
  const [loading, setLoading]         = React.useState(true);

  // Simulate async data load (demonstrates skeleton states)
  React.useEffect(() => {
    const t = setTimeout(() => setLoading(false), 900);
    return () => clearTimeout(t);
  }, []);

  const setActiveTab = t => { setActiveTabRaw(t); localStorage.setItem("uae_tab", t); };
  const setDark = v => {
    setDarkRaw(v);
    document.documentElement.setAttribute("data-theme", v ? "dark" : "light");
    localStorage.setItem("uae_theme", v ? "dark" : "light");
    const sel = document.getElementById("tweak-theme");
    if (sel) sel.value = v ? "dark" : "light";
  };

  // Sync theme on mount
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  }, []);

  const handleWorkflow = (id, action, note = null) => {
    setWorkflow(prev => {
      if (action === null) { const n = {...prev}; delete n[id]; return n; }
      return { ...prev, [id]: { action, note, ts: new Date().toLocaleTimeString() } };
    });
  };

  // Expose tweaks
  window.__setTab   = t  => setActiveTab(t);
  window.__setDark  = v  => setDark(v);

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg-deep)" }}>
      <TopBar activeTab={activeTab} setActiveTab={setActiveTab}
        runDate={runDate} dataSource={dataSource} dark={dark} toggleTheme={()=>setDark(!dark)} />

      <div style={{ padding:"20px 24px", maxWidth:1480, margin:"0 auto" }} className="tab-content" key={activeTab}>

        {activeTab === "overview" && <>
          <KPICards entities={entities} loading={loading} />
          <OverviewTab entities={entities} runName={runName}
            onSelectEntity={setSelected} loading={loading} />
        </>}

        {activeTab === "search" && (
          <SearchTab entities={entities} onSelectEntity={setSelected}
            workflowLog={workflowLog} onWorkflowAction={handleWorkflow} loading={loading} />
        )}

        {activeTab === "insights" && (
          <InsightsTab entities={entities} trends={trends} loading={loading} />
        )}
      </div>

      {/* Footer */}
      <div style={{ padding:"0 24px 20px", maxWidth:1480, margin:"0 auto" }}>
        <TrustBar runDate={runDate} dataSource={dataSource} runName={runName} />
      </div>

      {selectedEntity && (
        <DetailPanel entity={selectedEntity} onClose={()=>setSelected(null)}
          workflowLog={workflowLog} onWorkflowAction={handleWorkflow} />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// Tweaks wiring
window.addEventListener("message", e => {
  if (e.data?.type === "__activate_edit_mode")   document.getElementById("tweaks-panel").classList.add("visible");
  if (e.data?.type === "__deactivate_edit_mode") document.getElementById("tweaks-panel").classList.remove("visible");
});
window.parent.postMessage({ type: "__edit_mode_available" }, "*");
</script>
</body>
</html>
